<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ChaosCraft — Theme Proposals</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Space Mono', monospace;
  background: #06040E;
  color: #ddd8f8;
  padding: 14px 12px 48px;
  min-height: 100vh;
  font-size: 11px;
}
body::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 9999;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,.08) 2px,
    rgba(0,0,0,.08) 4px
  );
}

.pg-hd h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px; font-weight: 400; letter-spacing: .06em;
  background: linear-gradient(90deg,#FF00C0,#FF4040,#FFB000,#00FF90,#00E8FF,#B800FF);
  background-size: 300% 100%;
  animation: gradshift 4s linear infinite;
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
@keyframes gradshift {
  0%{background-position:0% 50%} 100%{background-position:300% 50%}
}
.pg-sub { font-size: 10.5px; color: #9888e8; margin-top:3px; margin-bottom:14px; line-height:1.5; }

.filter-row {
  display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 18px;
}
.f-btn {
  padding: 4px 11px; border-radius: 3px;
  font-size: 9px; font-weight: 700; cursor: pointer;
  border: 1.5px solid rgba(255,255,255,.15);
  background: rgba(255,255,255,.05); color: rgba(220,216,255,.75);
  transition: all .15s; font-family: 'Space Mono', monospace;
  text-transform: uppercase; letter-spacing: .06em;
}
.f-btn:hover { background: rgba(255,255,255,.1); color: #fff; border-color: rgba(255,255,255,.3); }

.theme-section { margin-bottom: 28px; }
.theme-section.hidden { display: none; }

.theme-hd { margin-bottom: 9px; }
.theme-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px; font-weight: 400; letter-spacing: .1em;
  display: flex; align-items: center; gap: 8px;
}
.theme-dot { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }
.theme-sources { font-size: 8.5px; color: #7068C0; margin-top: 2px; font-style: italic; font-family: 'Space Mono', monospace; }

.pair { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.mode-lbl {
  font-size: 7.5px; font-weight: 900; text-transform: uppercase;
  letter-spacing: .12em; color: #6858B8; margin-bottom: 4px;
  display: flex; align-items: center; gap: 4px;
}
.mode-lbl::after { content:''; flex:1; height:1px; background:rgba(160,140,255,.15); }

/* ── MOCK SHELL ── */
.mock {
  border-radius: 4px; overflow: hidden;
  border: 1.5px solid var(--bdr);
  background: var(--bg);
  font-family: 'Space Mono', monospace;
}
.m-top {
  background: var(--srf); border-bottom: 2px solid var(--bdr);
  padding: 6px 8px; display: flex; align-items: center; gap: 5px;
}
.m-ham {
  width: 20px; height: 20px; border-radius: 4px;
  background: var(--crd); border: 1px solid var(--bdr);
  font-size: 9px; display: flex; align-items: center; justify-content: center;
  color: var(--t2); flex-shrink: 0;
}
.m-title { flex:1; font-size: 8.5px; font-weight: 900; color: var(--tx); letter-spacing: .05em; text-transform: uppercase; }
.m-clock { font-size: 8px; font-weight: 700; color: var(--mu); }
.m-icon {
  width: 18px; height: 18px; border-radius: 4px;
  background: var(--crd); border: 1px solid var(--bdr);
  font-size: 8px; display: flex; align-items: center; justify-content: center; color: var(--t2);
}
.m-body { background: var(--bg); padding: 7px; display: flex; flex-direction: column; gap: 6px; }
.m-sec {
  font-size: 6.5px; font-weight: 900; text-transform: uppercase;
  letter-spacing: .1em; color: var(--mu);
  padding-bottom: 3px; border-bottom: 1px solid var(--bdr);
}
.m-nav { display: flex; flex-direction: column; gap: 2px; }
.m-ni {
  padding: 4px 6px; border-radius: 5px;
  font-size: 8.5px; font-weight: 600; color: var(--t2);
  border-left: 2.5px solid transparent; display: flex; align-items: center; gap: 4px; line-height: 1;
}
.m-ni.on { background: var(--ac-t); color: var(--ac); border-left-color: var(--ac); font-weight: 800; }
.m-card {
  background: var(--crd); border: 1.5px solid var(--bdr);
  border-radius: 3px; padding: 7px 8px;
}
.m-card-hd { font-size: 9.5px; font-weight: 800; color: var(--tx); margin-bottom: 2px; }
.m-card-txt { font-size: 8.5px; color: var(--t2); line-height: 1.4; margin-bottom: 5px; }
.m-prog { height: 5px; background: var(--bdr); border-radius: 3px; overflow: hidden; margin-bottom: 5px; }
.m-prog-fill { height: 100%; border-radius: 3px; background: var(--ac); }
.w70 { width: 70%; }
.rb { width:100%; background: linear-gradient(90deg,#ff6b9d 0%,#ff876c 15%,#f4ca00 30%,#8bb698 45%,#4ecdc4 60%,#645eb7 75%,#ff6b9d 100%); }
.m-btns { display: flex; gap: 3px; flex-wrap: wrap; }
.m-btn {
  padding: 3px 8px; border-radius: 2px;
  font-size: 7.5px; font-weight: 700; cursor: default;
  border: 1.5px solid transparent; font-family: 'Space Mono', monospace; line-height: 1.2;
  text-transform: uppercase; letter-spacing: .04em;
}
.b-ac { background: var(--ac); color: #fff; }
.b-out { background: transparent; border-color: var(--bdr); color: var(--t2); }
.b-err { background: var(--rd); color: #fff; }
.b-ok { background: var(--gn); color: #fff; }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.m-stat-n { font-size: 15px; font-weight: 900; line-height: 1; }
.m-stat-l { font-size: 7px; color: var(--mu); margin-top: 1px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
.m-tags { display: flex; gap: 3px; flex-wrap: wrap; }
.m-tag {
  padding: 2px 6px; border-radius: 2px;
  font-size: 7px; font-weight: 700; border: 1px solid;
  text-transform: uppercase; letter-spacing: .05em;
}
.tg-ac { color: var(--ac); border-color: var(--ac); background: var(--ac-t); }
.tg-gn { color: var(--gn); border-color: var(--gn); background: var(--gn-t); }
.tg-rd { color: var(--rd); border-color: var(--rd); background: var(--rd-t); }
.tg-gd { color: var(--gd); border-color: var(--gd); background: var(--gd-t); }
.tg-tl { color: var(--tl); border-color: var(--tl); background: var(--tl-t); }
.m-tog-row { display: flex; align-items: center; gap: 6px; }
.m-tog {
  width: 24px; height: 13px; border-radius: 7px;
  background: var(--ac); position: relative; flex-shrink: 0;
}
.m-tog::after {
  content:''; position: absolute; right: 2px; top: 2px;
  width: 9px; height: 9px; border-radius: 50%; background: #fff;
}
.m-tog.off { background: var(--bdr); }
.m-tog.off::after { right: auto; left: 2px; }
.m-tog-lbl { font-size: 8.5px; color: var(--t2); font-weight: 600; }
.m-fabs { display: flex; gap: 5px; align-items: center; }
.m-fab {
  width: 26px; height: 26px; border-radius: 3px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; color: #fff; box-shadow: 0 2px 7px rgba(0,0,0,.28);
}
.fb-ac { background: var(--ac); }
.fb-rd { background: var(--rd); }
.fb-tl { background: var(--tl); }
.m-fabs-lbl { font-size: 8px; color: var(--mu); flex: 1; }
.m-swatches { display: flex; gap: 3px; }
.m-sw { height: 10px; flex: 1; border-radius: 3px; }
.note-box {
  margin-top: 7px; padding: 8px 10px; border-radius: 3px; font-size: 9px; line-height: 1.6;
  font-family: 'Space Mono', monospace;
}

.mode-lbl {
  font-size: 7px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .14em; color: #6858B8; margin-bottom: 4px;
  display: flex; align-items: center; gap: 4px;
  font-family: 'Space Mono', monospace;
}
.mode-lbl::after { content:''; flex:1; height:1px; background:rgba(160,140,255,.15); }

@media (max-width: 480px) { .pair { grid-template-columns: 1fr; } }
</style>
</head>

    id:'11', emoji:'🪵', name:'DRIFT LOG', sub:'Teal & Terra',
    aD:'#FF7030',
    src:'Drawn from: harbor teal water · warm orange light · sandy driftwood · #2A6980, #F37C47, #DFA782',
    nBg:'rgba(0,150,160,.12)', nBdr:'rgba(0,150,160,.35)', nTxt:'#208898', nStr:'#30D0E0',
    note:'The only theme where the accent SHIFTS between modes — dark teal in light, warm orange in dark. This mirrors the source (harbor is teal in daylight, orange-lit at night). Teal stays as --tl in both modes. Light mode is the most "spa-green" feel. Most context-aware / environmental design.',
    light:{ bg:'#DCF8F6', srf:'#BCEEED', crd:'#EEFFFE', bdr:'#50C8C0', tx:'#020E0C', t2:'#083830', mu:'#3A9090', ac:'#007880', gn:'#1A8050', rd:'#D02808', gd:'#C07000', tl:'#0898A8', sw:['#007880','#1A8050','#D02808','#C07000','#0898A8'] },
    dark: { bg:'#010606', srf:'#030E0E', crd:'#061818', bdr:'#0A4848', tx:'#C8FFFC', t2:'#40F0E0', mu:'#289898', ac:'#FF7030', gn:'#20E898', rd:'#FF2818', gd:'#FFB000', tl:'#00C8E0', sw:['#FF7030','#20E898','#FF2818','#FFB000','#00C8E0'] }
  }
];

// ─── UTILITIES ───────────────────────────────────────────────
function hexRgb(h) {
  if (!h || h.length < 4) return '128,128,128';
  if (h.length === 4) h = '#'+h[1]+h[1]+h[2]+h[2]+h[3]+h[3];
  return `${parseInt(h.slice(1,3),16)},${parseInt(h.slice(3,5),16)},${parseInt(h.slice(5,7),16)}`;
}

function styleStr(c) {
  const t = (hex, a) => `rgba(${hexRgb(hex)},${a})`;
  return [
    `--bg:${c.bg}`,`--srf:${c.srf}`,`--crd:${c.crd}`,`--bdr:${c.bdr}`,
    `--tx:${c.tx}`,`--t2:${c.t2}`,`--mu:${c.mu}`,
    `--ac:${c.ac}`,`--gn:${c.gn}`,`--rd:${c.rd}`,`--gd:${c.gd}`,`--tl:${c.tl}`,
    `--ac-t:${t(c.ac,.20)}`,`--gn-t:${t(c.gn,.18)}`,
    `--rd-t:${t(c.rd,.18)}`,`--gd-t:${t(c.gd,.18)}`,`--tl-t:${t(c.tl,.18)}`
  ].join(';');
}

// ─── MOCK TEMPLATE ───────────────────────────────────────────
function mockHTML(c, label) {
  const swatches = (c.sw||[c.ac,c.gn,c.rd,c.gd,c.tl])
    .map(s=>`<div class="m-sw" style="background:${s}" title="${s}"></div>`).join('');
  return `
  <div class="mode-wrap">
    <div class="mode-lbl">${label}</div>
    <div class="mock" style="${styleStr(c)}">
      <div class="m-top">
        <div class="m-ham">☰</div>
        <div class="m-title">Quick Check-In</div>
        <div class="m-clock">2:45</div>
        <div class="m-icon">⚙</div>
      </div>
      <div class="m-body">
        <div class="m-sec">Navigation</div>
        <div class="m-nav">
          <div class="m-ni on"><span>🧠</span>Day Builder</div>
          <div class="m-ni"><span>📅</span>Weekly</div>
          <div class="m-ni"><span>💸</span>Money</div>
        </div>
        <div class="m-sec">Today's Focus</div>
        <div class="m-card">
          <div class="m-card-hd">Submit invoice</div>
          <div class="m-card-txt">Due today · medium energy</div>
          <div class="m-prog"><div class="m-prog-fill w70"></div></div>
          <div class="m-btns">
            <button class="m-btn b-ac">Done</button>
            <button class="m-btn b-out">Later</button>
            <button class="m-btn b-err">Skip</button>
          </div>
        </div>
        <div class="two-col">
          <div class="m-card"><div class="m-stat-n" style="color:var(--ac)">3</div><div class="m-stat-l">tasks left</div></div>
          <div class="m-card"><div class="m-stat-n" style="color:var(--gn)">7</div><div class="m-stat-l">streak days</div></div>
        </div>
        <div class="m-sec">Tags &amp; Status</div>
        <div class="m-tags">
          <span class="m-tag tg-ac">focus</span>
          <span class="m-tag tg-gn">done</span>
          <span class="m-tag tg-rd">urgent</span>
          <span class="m-tag tg-gd">hold</span>
          <span class="m-tag tg-tl">later</span>
        </div>
        <div class="m-card">
          <div class="m-tog-row" style="margin-bottom:4px"><div class="m-tog"></div><span class="m-tog-lbl">Reminders on</span></div>
          <div class="m-tog-row"><div class="m-tog off"></div><span class="m-tog-lbl">Dense view</span></div>
        </div>
        <div class="m-sec">Rainbow bar (fixed, theme-independent)</div>
        <div class="m-prog"><div class="m-prog-fill rb"></div></div>
        <div class="m-fabs">
          <div class="m-fab fb-ac">🧠</div>
          <div class="m-fab fb-rd">🔥</div>
          <div class="m-fab fb-tl">✓</div>
          <span class="m-fabs-lbl">FAB cluster</span>
        </div>
        <div class="m-sec">Semantic color roles (accent · green · red · gold · teal)</div>
        <div class="m-swatches">${swatches}</div>
      </div>
    </div>
  </div>`;
}

// ─── RENDER FILTER BUTTONS ───────────────────────────────────
const filterRow = document.getElementById('filters');

// All button
const allBtn = document.createElement('button');
allBtn.className = 'f-btn on';
allBtn.textContent = 'All Themes';
allBtn.dataset.t = 'all';
allBtn.onclick = () => filter('all', allBtn);
filterRow.appendChild(allBtn);

themes.forEach(t => {
  const btn = document.createElement('button');
  btn.className = 'f-btn';
  btn.textContent = `${t.emoji} ${t.name}`;
  btn.dataset.t = t.id;
  btn.style.cssText = `--ac:${t.aD}`;
  btn.onclick = () => filter(t.id, btn);
  btn.addEventListener('click', function() {
    this.style.background = `rgba(${hexRgb(t.aD)},.18)`;
    this.style.borderColor = `rgba(${hexRgb(t.aD)},.5)`;
    this.style.color = t.aD;
  });
  filterRow.appendChild(btn);
});

// ─── RENDER THEME SECTIONS ───────────────────────────────────
const container = document.getElementById('themes-container');

themes.forEach(t => {
  const section = document.createElement('div');
  section.className = 'theme-section';
  section.dataset.theme = t.id;

  section.innerHTML = `
    <div class="theme-hd">
      <div class="theme-name" style="color:${t.aD}">
        <span class="theme-dot" style="background:${t.aD}"></span>
        ${t.emoji} ${t.name} — ${t.sub}
      </div>
      <div class="theme-sources">${t.src}</div>
    </div>
    <div class="pair">
      ${mockHTML(t.light, '☀️ Light')}
      ${mockHTML(t.dark, '🌑 Dark')}
    </div>
    <div class="note-box" style="background:${t.nBg};border:1px solid ${t.nBdr};color:${t.nTxt}">
      <strong style="color:${t.nStr}">${t.name} notes:</strong>
      ${t.note}
    </div>`;

  container.appendChild(section);
});

// ─── COMPARISON TABLE ────────────────────────────────────────
const table = document.createElement('div');
table.style.cssText = 'margin-top:28px;padding:12px;background:rgba(140,120,255,.06);border:1px solid rgba(140,120,255,.18);border-radius:12px;';
table.innerHTML = `
  <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#8870d8;margin-bottom:10px;font-family:'Space Mono',monospace;">// THEME_INDEX — accent · dark_bg · light_bg · mood</div>
  <div style="display:flex;flex-direction:column;gap:5px;">
    ${themes.map(t => `
      <div style="display:flex;align-items:center;gap:8px;font-size:9px;">
        <div style="width:10px;height:10px;border-radius:50%;background:${t.aD};flex-shrink:0"></div>
        <span style="color:${t.aD};font-weight:800;min-width:90px">${t.emoji} ${t.name}</span>
        <div style="width:28px;height:12px;border-radius:3px;background:${t.dark.bg};border:1px solid rgba(255,255,255,.08);flex-shrink:0" title="Dark bg: ${t.dark.bg}"></div>
        <div style="width:28px;height:12px;border-radius:3px;background:${t.light.bg};border:1px solid rgba(0,0,0,.08);flex-shrink:0" title="Light bg: ${t.light.bg}"></div>
        <span style="color:#7868B0;flex:1">${t.sub}</span>
      </div>`).join('')}
  </div>
  <div style="margin-top:8px;font-size:8px;color:#5A50A0;font-family:'Space Mono',monospace;">// dark_bg · light_bg · sub</div>`;
container.appendChild(table);

// ─── FILTER FUNCTION ─────────────────────────────────────────
function filter(t, clickedBtn) {
  document.querySelectorAll('.f-btn').forEach(b => {
    b.classList.remove('on');
    b.style.background = '';
    b.style.borderColor = '';
    b.style.color = '';
  });
  clickedBtn.classList.add('on');
  if (t === 'all') {
    clickedBtn.style.background = 'rgba(255,255,255,.12)';
    clickedBtn.style.borderColor = 'rgba(255,255,255,.3)';
    clickedBtn.style.color = '#fff';
  }
  document.querySelectorAll('.theme-section').forEach(s => {
    s.classList.toggle('hidden', t !== 'all' && s.dataset.theme !== t);
  });
}
</script>
</body>
